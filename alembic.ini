# Alembic — configuração da Market Data Platform.
#
# A URL do banco NÃO é declarada aqui. `alembic/env.py` lê `MARKET_DB_URL`
# do ambiente (mesmo contrato exigido pelo backend desde ISSUE-004).
# Manter a URL fora do `alembic.ini` evita versionar credencial e mantém
# a fonte da verdade de configuração em um único lugar (`.env`).

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os
# sqlalchemy.url intencionalmente ausente — ver alembic/env.py.

[post_write_hooks]
# Sem hooks por enquanto.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
